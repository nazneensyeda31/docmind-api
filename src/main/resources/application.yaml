spring:
  application:
    name: docmind-api
  datasource:
    url: jdbc:postgresql://localhost:5432/docmind
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: docmind-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.docmind.docmind_api.kafka.event"
        spring.json.value.default.type: "com.docmind.docmind_api.kafka.event.DocumentUploadedEvent"

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  config:
    import: "optional:file:.env[.properties]"

anthropic:
  api:
    key: ${CLAUDE_API_KEY}

resilience4j:
  retry:
    instances:
      claudeApi:
        max-attempts: 3
        wait-duration: 5s
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
  circuitbreaker:
    instances:
      claudeApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

